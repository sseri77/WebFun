<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marking-Kit Pro Ops v13.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; font-family: sans-serif; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; border-radius: 12px; }
        .input-field { background-color: #1a1c1e; border: 1px solid #3f444c; color: white; border-radius: 8px; padding: 10px; font-size: 14px; }
        .btn-toggle { background-color: #3f444c; color: #a1a1a1; font-weight: bold; border-radius: 8px; }
        .active-in { background-color: #2563eb !important; color: white !important; }
        .active-process { background-color: #d97706 !important; color: white !important; }
        .active-out { background-color: #dc2626 !important; color: white !important; }
        tr.row-link:hover { background-color: #32363c; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-lg font-bold text-blue-400">Marking-Kit Pro Ops v13.0</h1>
            <div id="status" class="text-[10px] font-mono text-blue-500">● READY</div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 text-center">
            <div class="card p-3 border-t-4 border-blue-500"><p class="text-[9px] text-gray-500">미재단</p><p class="text-lg font-bold" id="totalRaw">0</p></div>
            <div class="card p-3 border-t-4 border-yellow-500"><p class="text-[9px] text-gray-500">가용재고</p><p class="text-lg font-bold text-yellow-500" id="totalAvailable">0</p></div>
            <div class="card p-3 border-t-4 border-green-500"><p class="text-[9px] text-gray-500">누적출고</p><p class="text-lg font-bold text-green-500" id="totalOut">0</p></div>
            <div class="card p-3 border-t-4 border-purple-500"><p class="text-[9px] text-gray-500">자산합계</p><p class="text-lg font-bold text-purple-400" id="totalAsset">0</p></div>
        </div>

        <section class="card p-5 shadow-xl mb-6">
            <div class="flex justify-between items-center mb-5">
                <div class="flex gap-1 p-1 bg-[#1a1c1e] rounded-lg">
                    <button onclick="setMode('입고')" id="modeIn" class="btn-toggle active-in px-4 py-2 text-xs">입고</button>
                    <button onclick="setMode('공정')" id="modeProcess" class="btn-toggle px-4 py-2 text-xs">재단</button>
                    <button onclick="setMode('출고')" id="modeOut" class="btn-toggle px-4 py-2 text-xs">출고</button>
                </div>
                <div id="modeLabel" class="text-[10px] font-bold text-blue-500 italic">● 입고 모드</div>
            </div>

            <form id="mainForm" class="space-y-4">
                <input type="hidden" id="editIdx" value="">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 ml-1">구단명 (시트에서 불러옴)</label>
                        <select id="teamSelect" onchange="checkDirect(this)" class="input-field w-full mt-1"></select>
                        <input type="text" id="manualTeam" class="input-field w-full hidden mt-2" placeholder="새 구단명 입력">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 ml-1">콜라보명 (선택 입력)</label>
                        <input type="text" id="collabName" class="input-field w-full mt-1" placeholder="예: 슬램덩크, 챔피언 등">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 ml-1">배번</label>
                        <input type="text" id="pNumber" class="input-field w-full text-center" placeholder="00">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] text-gray-500 ml-1">선수 이름 / 수량 <span id="maxInfo" class="text-red-500 ml-1"></span></label>
                        <div class="flex gap-2">
                            <input type="text" id="pName" class="input-field flex-1" placeholder="이름">
                            <input type="number" id="qty" class="input-field w-20" placeholder="0" required>
                        </div>
                    </div>
                </div>

                <div class="pt-2 flex gap-2">
                    <button type="submit" id="submitBtn" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold text-sm shadow-lg">데이터 저장하기</button>
                    <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden bg-gray-600 px-6 py-4 rounded-xl font-bold">X</button>
                </div>
            </form>
        </section>

        <section class="card overflow-hidden">
            <div class="p-3 bg-[#32363c] flex justify-between items-center border-b border-gray-700">
                <input type="text" id="searchBar" oninput="searchData()" class="input-field w-48 text-xs" placeholder="검색...">
                <div id="pagination" class="flex gap-1"></div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px]">
                    <thead>
                        <tr class="bg-[#1a1c1e] text-gray-500 border-b border-gray-800">
                            <th class="p-3">항목 (클릭 시 자동 입력)</th>
                            <th class="p-3 text-right">미재단</th>
                            <th class="p-3 text-right">가용</th>
                            <th class="p-3 text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-800"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw9jO5TLGGgy2hTXRM2rnoj8exDwlKmAnRsknfJ7zVfSrRRnK5hpptyrzxa9QDecOgG_Q/exec";
        let rawData = [], teamList = [], summary = {}, filteredKeys = [];
        let curMode = "입고", curPage = 1, pageSize = 10;

        async function init() {
            try {
                document.getElementById('status').innerText = "● SYNCING...";
                const res = await fetch(API_URL);
                const d = await res.json();
                rawData = d.inventory || [];
                teamList = d.teams || [];
                
                const ts = document.getElementById('teamSelect');
                ts.innerHTML = '<option value="">-- 구단 선택 --</option>';
                teamList.forEach(t => ts.innerHTML += `<option value="${t.name}">${t.name}</option>`);
                ts.innerHTML += '<option value="direct">➕ 직접 입력</option>';

                processData();
                document.getElementById('status').innerText = "● STABLE";
            } catch (e) { document.getElementById('status').innerText = "● ERROR"; }
        }

        function processData() {
            summary = {};
            let rT = 0, aT = 0, oT = 0;
            rawData.forEach(item => {
                const key = `${item.team} | [${item.playerNumber}] ${item.playerName}`;
                if (!summary[key]) summary[key] = { raw: 0, available: 0, team:item.team, num:item.playerNumber, name:item.playerName, lastIdx: item.idx };
                const q = parseInt(item.amount);
                if (item.action === '입고') { summary[key].raw += q; rT += q; }
                else if (item.action === '공정') { summary[key].raw -= q; summary[key].available += q; rT -= q; aT += q; }
                else if (item.action === '출고') { summary[key].available -= q; aT -= amt; oT += q; }
            });
            searchData();
            document.getElementById('totalRaw').innerText = rT;
            document.getElementById('totalAvailable').innerText = aT;
            document.getElementById('totalOut').innerText = oT;
            document.getElementById('totalAsset').innerText = rT + aT;
        }

        function searchData() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            filteredKeys = Object.keys(summary).filter(k => k.toLowerCase().includes(query)).sort();
            curPage = 1; renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            const pg = document.getElementById('pagination');
            tbody.innerHTML = '';
            const paged = filteredKeys.slice((curPage-1)*pageSize, curPage*pageSize);

            paged.forEach(key => {
                const s = summary[key];
                const tr = document.createElement('tr');
                tr.className = "row-link";
                tr.innerHTML = `<td class="p-3" onclick="clickToForm('${key}')">${key}</td>
                    <td class="p-3 text-right text-gray-500">${s.raw}</td>
                    <td class="p-3 text-right text-yellow-500 font-bold">${s.available}</td>
                    <td class="p-3 text-center">
                        <button onclick="startEdit('${s.lastIdx}')" class="text-blue-500 mr-2">수정</button>
                        <button onclick="deleteRow('${s.lastIdx}')" class="text-red-500">삭제</button>
                    </td>`;
                tbody.appendChild(tr);
            });

            const totalPages = Math.ceil(filteredKeys.length / pageSize);
            pg.innerHTML = '';
            for(let i=1; i<=totalPages; i++) {
                pg.innerHTML += `<button onclick="curPage=${i}; renderTable();" class="px-2 py-1 text-[10px] rounded ${i===curPage?'bg-blue-600':'bg-gray-700'}">${i}</button>`;
            }
        }

        function checkDirect(sel) {
            document.getElementById('manualTeam').classList.toggle('hidden', sel.value !== 'direct');
        }

        function clickToForm(key) {
            const s = summary[key];
            const ts = document.getElementById('teamSelect');
            
            // 시트에서 불러온 구단 목록과 일치하는지 확인 (콜라보 분리 로직)
            let matched = false;
            for(let t of teamList) {
                if(s.team.startsWith(t.name)) {
                    ts.value = t.name;
                    document.getElementById('collabName').value = s.team.replace(t.name, "").trim();
                    matched = true;
                    break;
                }
            }
            if(!matched) {
                ts.value = "direct"; checkDirect(ts);
                document.getElementById('manualTeam').value = s.team;
                document.getElementById('collabName').value = "";
            } else {
                document.getElementById('manualTeam').classList.add('hidden');
            }

            document.getElementById('pNumber').value = s.num;
            document.getElementById('pName').value = s.name;
            const stock = curMode === '공정' ? s.raw : s.available;
            if(curMode !== '입고') {
                document.getElementById('maxInfo').innerText = `(MAX:${stock})`;
                document.getElementById('qty').max = stock;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setMode(m) {
            curMode = m;
            document.getElementById('modeLabel').innerText = `● ${m} 모드`;
            ['modeIn', 'modeProcess', 'modeOut'].forEach(id => document.getElementById(id).className = 'btn-toggle px-4 py-2 text-xs');
            const map = {'입고':'modeIn', '공정':'modeProcess', '출고':'modeOut'};
            const cls = {'입고':'active-in', '공정':'active-process', '출고':'active-out'};
            document.getElementById(map[m]).classList.add(cls[m]);
            document.getElementById('maxInfo').innerText = "";
            document.getElementById('qty').removeAttribute('max');
        }

        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editIdx = document.getElementById('editIdx').value;
            const ts = document.getElementById('teamSelect').value;
            const bTeam = ts === 'direct' ? document.getElementById('manualTeam').value.trim() : ts;
            const cName = document.getElementById('collabName').value.trim();
            
            if(!bTeam) { alert("구단을 선택하거나 입력하세요."); return; }

            const qtyVal = parseInt(document.getElementById('qty').value);
            const maxVal = parseInt(document.getElementById('qty').max);
            if(curMode !== '입고' && !editIdx && maxVal && qtyVal > maxVal) {
                alert(`가용 재고를 초과했습니다.`); return;
            }

            const payload = {
                method: editIdx ? 'UPDATE' : 'INSERT',
                idx: editIdx, baseTeam: bTeam, collabName: cName, isNewTeam: (ts === 'direct'),
                playerNumber: document.getElementById('pNumber').value,
                playerName: document.getElementById('pName').value,
                amount: qtyVal, action: curMode
            };

            document.getElementById('submitBtn').disabled = true;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            location.reload();
        });

        function resetForm() { location.reload(); }
        function deleteRow(idx) { if(confirm("삭제?")) fetch(API_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({method:'DELETE',idx:idx})}).then(()=>location.reload()); }
        function startEdit(idx) {
            const item = rawData.find(d => d.idx == idx);
            document.getElementById('editIdx').value = idx;
            document.getElementById('pNumber').value = item.playerNumber;
            document.getElementById('pName').value = item.playerName;
            document.getElementById('qty').value = item.amount;
            clickToForm(`${item.team} | [${item.playerNumber}] ${item.playerName}`);
            setMode(item.action);
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('submitBtn').innerText = "수정 완료";
        }
        window.onload = init;
    </script>
</body>
</html>
