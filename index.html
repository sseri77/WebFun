<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marking-Kit Pro Ops v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; font-family: 'Pretendard', sans-serif; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; }
        .input-field { background-color: #1a1c1e; border: 1px solid #3f444c; color: white; transition: all 0.2s; }
        .input-field:focus { border-color: #60a5fa; outline: none; }
        .btn-toggle { background-color: #3f444c; color: #a1a1a1; font-weight: bold; }
        .active-in { background-color: #2563eb !important; color: white !important; }
        .active-process { background-color: #d97706 !important; color: white !important; }
        .active-out { background-color: #dc2626 !important; color: white !important; }
        tr.row-link:hover { background-color: #32363c; cursor: pointer; }
        .page-btn { padding: 5px 12px; border-radius: 6px; background: #3f444c; font-size: 12px; }
        .page-btn.active { background: #2563eb; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-400">Marking-Kit Pro Ops <span class="text-xs text-gray-500">v11.0</span></h1>
            <div id="status" class="text-xs font-mono italic text-blue-500">● READY</div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">
            <div class="card p-3 rounded-xl border-t-4 border-blue-500">
                <p class="text-[10px] text-gray-400">미재단</p>
                <p class="text-xl font-bold" id="totalRaw">0</p>
            </div>
            <div class="card p-3 rounded-xl border-t-4 border-yellow-500">
                <p class="text-[10px] text-gray-400">가용재고</p>
                <p class="text-xl font-bold text-yellow-400" id="totalAvailable">0</p>
            </div>
            <div class="card p-3 rounded-xl border-t-4 border-green-500">
                <p class="text-[10px] text-gray-400">누적출고</p>
                <p class="text-xl font-bold text-green-400" id="totalOut">0</p>
            </div>
            <div class="card p-3 rounded-xl border-t-4 border-purple-500">
                <p class="text-[10px] text-gray-400">총 자산</p>
                <p class="text-xl font-bold text-purple-400" id="totalAsset">0</p>
            </div>
        </div>

        <section class="card p-5 rounded-xl mb-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-1 p-1 bg-[#1a1c1e] rounded-lg">
                    <button onclick="setMode('입고')" id="modeIn" class="btn-toggle active-in px-4 py-2 rounded-md text-xs">입고</button>
                    <button onclick="setMode('공정')" id="modeProcess" class="btn-toggle px-4 py-2 rounded-md text-xs">재단</button>
                    <button onclick="setMode('출고')" id="modeOut" class="btn-toggle px-4 py-2 rounded-md text-xs">출고</button>
                </div>
                <h2 id="formTitle" class="text-sm font-bold text-gray-400">기록하기</h2>
            </div>

            <form id="mainForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="hidden" id="editIdx" value="">
                <div>
                    <label class="block text-[10px] text-gray-500 mb-1">구단명 / 콜라보</label>
                    <select id="teamSelect" onchange="toggleDirect(this)" class="input-field w-full p-2.5 rounded-lg text-sm"></select>
                    <div id="directInput" class="hidden mt-2 space-y-2">
                        <input type="text" id="baseTeam" class="input-field w-full p-2.5 rounded-lg text-sm" placeholder="구단명">
                        <input type="text" id="collabTeam" class="input-field w-full p-2.5 rounded-lg text-sm" placeholder="콜라보명(옵션)">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 mb-1">배번 / 이름</label>
                    <div class="flex gap-2">
                        <input type="text" id="pNumber" class="input-field w-1/3 p-2.5 rounded-lg text-sm" placeholder="번호">
                        <input type="text" id="pName" class="input-field w-2/3 p-2.5 rounded-lg text-sm" placeholder="이름">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 mb-1">수량 <span id="maxInfo" class="text-red-400 ml-1"></span></label>
                    <div class="flex gap-2">
                        <input type="number" id="qty" class="input-field flex-1 p-2.5 rounded-lg text-sm" placeholder="0" required>
                        <button type="submit" id="submitBtn" class="bg-blue-600 px-6 rounded-lg text-sm font-bold">저장</button>
                        <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden bg-gray-600 px-3 rounded-lg text-sm">X</button>
                    </div>
                </div>
            </form>
        </section>

        <section class="card rounded-xl overflow-hidden shadow-xl">
            <div class="p-4 bg-[#32363c] flex flex-col md:flex-row justify-between gap-4">
                <input type="text" id="searchBar" oninput="searchData()" class="input-field w-full md:w-1/3 p-2 rounded-lg text-xs" placeholder="구단, 이름, 번호 검색...">
                <div id="pagination" class="flex gap-1 justify-center items-center"></div>
            </div>
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="bg-[#1a1c1e] text-gray-500 uppercase">
                        <th class="p-4">구단 / [배번] 선수</th>
                        <th class="p-4 text-right">미재단</th>
                        <th class="p-4 text-right">가용재고</th>
                        <th class="p-4 text-center">동작</th>
                    </tr>
                </thead>
                <tbody id="dataTable" class="divide-y divide-gray-800"></tbody>
            </table>
        </section>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx68P1WdWjI63daADBxsAMmBfPkxmK6ba4GFfClrnQm6BiHwMqPx2P45qRxsuZ3-RkZOQ/exec";
        let rawData = [], teams = [], summary = {}, filteredKeys = [];
        let curMode = "입고", curPage = 1, pageSize = 10;

        async function init() {
            try {
                document.getElementById('status').innerText = "● SYNCING...";
                const res = await fetch(API_URL);
                const d = await res.json();
                rawData = d.inventory || [];
                teams = d.teams || [];
                
                const ts = document.getElementById('teamSelect');
                ts.innerHTML = '<option value="">-- 구단 선택 --</option>';
                teams.forEach(t => ts.innerHTML += `<option value="${t.name}">${t.name}</option>`);
                ts.innerHTML += '<option value="direct">➕ 직접 입력</option>';

                processData();
                document.getElementById('status').innerText = "● STABLE";
            } catch (e) { document.getElementById('status').innerText = "● ERROR"; }
        }

        function processData() {
            summary = {};
            let rT = 0, aT = 0, oT = 0;
            rawData.forEach(item => {
                const key = `${item.team} | [${item.playerNumber}] ${item.playerName}`;
                if (!summary[key]) summary[key] = { raw: 0, available: 0, lastIdx: item.idx, team:item.team, num:item.playerNumber, name:item.playerName };
                const q = item.amount;
                if (item.action === '입고') { summary[key].raw += q; rT += q; }
                else if (item.action === '공정') { summary[key].raw -= q; summary[key].available += q; rT -= q; aT += q; }
                else if (item.action === '출고') { summary[key].available -= q; aT -= q; oT += q; }
                summary[key].lastIdx = item.idx;
            });
            filteredKeys = Object.keys(summary).sort();
            searchData(); // 리스트 렌더링 포함
            document.getElementById('totalRaw').innerText = rT;
            document.getElementById('totalAvailable').innerText = aT;
            document.getElementById('totalOut').innerText = oT;
            document.getElementById('totalAsset').innerText = rT + aT;
        }

        function searchData() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            filteredKeys = Object.keys(summary).filter(k => k.toLowerCase().includes(query)).sort();
            curPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            const pg = document.getElementById('pagination');
            tbody.innerHTML = '';
            
            const start = (curPage - 1) * pageSize;
            const pagedKeys = filteredKeys.slice(start, start + pageSize);

            pagedKeys.forEach(key => {
                const s = summary[key];
                const tr = document.createElement('tr');
                tr.className = "row-link border-b border-gray-800";
                tr.innerHTML = `
                    <td class="p-4" onclick="clickToForm('${key}')">${key}</td>
                    <td class="p-4 text-right text-gray-500" onclick="clickToForm('${key}')">${s.raw}</td>
                    <td class="p-4 text-right text-blue-400 font-bold" onclick="clickToForm('${key}')">${s.available}</td>
                    <td class="p-4 text-center">
                        <button onclick="startEdit('${s.lastIdx}')" class="text-blue-400 mr-2">수정</button>
                        <button onclick="deleteRow('${s.lastIdx}')" class="text-red-400">삭제</button>
                    </td>`;
                tbody.appendChild(tr);
            });

            // 페이징 버튼
            const totalPages = Math.ceil(filteredKeys.length / pageSize);
            pg.innerHTML = '';
            for(let i=1; i<=totalPages; i++) {
                pg.innerHTML += `<button onclick="curPage=${i}; renderTable();" class="page-btn ${i===curPage?'active':''}">${i}</button>`;
            }
        }

        function clickToForm(key) {
            const s = summary[key];
            document.getElementById('teamSelect').value = s.team;
            if(document.getElementById('teamSelect').value === "") {
                document.getElementById('teamSelect').value = "direct";
                toggleDirect({value:'direct'});
                const pts = s.team.split(' ');
                document.getElementById('baseTeam').value = pts[0];
                document.getElementById('collabTeam').value = pts.slice(1).join(' ');
            }
            document.getElementById('pNumber').value = s.num;
            document.getElementById('pName').value = s.name;
            
            // 수량 가이드
            const stock = curMode === '공정' ? s.raw : s.available;
            if(curMode !== '입고') {
                document.getElementById('maxInfo').innerText = `(MAX: ${stock})`;
                document.getElementById('qty').max = stock;
            } else {
                document.getElementById('maxInfo').innerText = "";
                document.getElementById('qty').removeAttribute('max');
            }
        }

        function setMode(m) {
            curMode = m;
            document.getElementById('formTitle').innerText = `${m} 기록하기`;
            ['modeIn', 'modeProcess', 'modeOut'].forEach(id => document.getElementById(id).className = 'btn-toggle px-4 py-2 rounded-md text-xs');
            const map = {'입고':'modeIn', '공정':'modeProcess', '출고':'modeOut'};
            const cls = {'입고':'active-in', '공정':'active-process', '출고':'active-out'};
            document.getElementById(map[m]).classList.add(cls[m]);
            document.getElementById('maxInfo').innerText = "";
            document.getElementById('qty').removeAttribute('max');
        }

        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editIdx = document.getElementById('editIdx').value;
            const ts = document.getElementById('teamSelect').value;
            const finalTeam = ts === 'direct' ? 
                (document.getElementById('baseTeam').value + ' ' + document.getElementById('collabTeam').value).trim() : ts;
            
            const qtyVal = parseInt(document.getElementById('qty').value);
            const maxVal = parseInt(document.getElementById('qty').max);
            
            if(curMode !== '입고' && maxVal && qtyVal > maxVal) {
                alert(`재고가 부족합니다. (최대 ${maxVal})`);
                return;
            }

            const payload = {
                method: editIdx ? 'UPDATE' : 'INSERT',
                idx: editIdx,
                team: finalTeam,
                playerNumber: document.getElementById('pNumber').value,
                playerName: document.getElementById('pName').value,
                amount: qtyVal,
                action: curMode
            };

            document.getElementById('submitBtn').disabled = true;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            location.reload();
        });

        function toggleDirect(sel) { document.getElementById('directInput').classList.toggle('hidden', sel.value !== 'direct'); }
        function resetForm() { location.reload(); }
        function startEdit(idx) {
            const item = rawData.find(d => d.idx == idx);
            document.getElementById('editIdx').value = idx;
            document.getElementById('teamSelect').value = item.team;
            if(document.getElementById('teamSelect').value === "") {
                document.getElementById('teamSelect').value = "direct";
                toggleDirect({value:'direct'});
                const pts = item.team.split(' ');
                document.getElementById('baseTeam').value = pts[0];
                document.getElementById('collabTeam').value = pts.slice(1).join(' ');
            }
            document.getElementById('pNumber').value = item.playerNumber;
            document.getElementById('pName').value = item.playerName;
            document.getElementById('qty').value = item.amount;
            setMode(item.action);
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo(0,0);
        }
        function deleteRow(idx) {
            if(confirm("이 항목을 삭제하시겠습니까?")) {
                fetch(API_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({method:'DELETE', idx:idx}) }).then(()=>location.reload());
            }
        }
        window.onload = init;
    </script>
</body>
</html>
