<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marking-Kit Pro Ops v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; font-family: sans-serif; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; }
        .input-field { background-color: #1a1c1e; border: 1px solid #3f444c; color: white; }
        .btn-toggle { background-color: #3f444c; color: #a1a1a1; transition: all 0.2s; }
        .active-in { background-color: #2563eb !important; color: white !important; border: 2px solid #60a5fa; }
        .active-process { background-color: #d97706 !important; color: white !important; border: 2px solid #fbbf24; }
        .active-out { background-color: #dc2626 !important; color: white !important; border: 2px solid #f87171; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Marking-Kit Pro Ops</h1>
                <p class="text-gray-400 text-sm">3-Sheet 분할 관리 시스템 v6.0</p>
            </div>
            <div id="status" class="text-xs text-blue-500 font-mono italic">● SYNCING...</div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 rounded-xl text-center border-t-4 border-blue-500">
                <h3 class="text-[10px] text-gray-400 uppercase">미재단 원단</h3>
                <p class="text-2xl font-bold" id="totalRaw">0</p>
            </div>
            <div class="card p-4 rounded-xl text-center border-t-4 border-yellow-500">
                <h3 class="text-[10px] text-gray-400 uppercase">가용재고</h3>
                <p class="text-2xl font-bold text-yellow-400" id="totalAvailable">0</p>
            </div>
            <div class="card p-4 rounded-xl text-center border-t-4 border-green-500">
                <h3 class="text-[10px] text-gray-400 uppercase">누적 출고</h3>
                <p class="text-2xl font-bold text-green-400" id="totalOut">0</p>
            </div>
            <div class="card p-4 rounded-xl text-center border-t-4 border-purple-500">
                <h3 class="text-[10px] text-gray-400 uppercase">현 자산</h3>
                <p class="text-2xl font-bold text-purple-400" id="totalAsset">0</p>
            </div>
        </div>

        <section class="card p-6 rounded-xl mb-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="formTitle" class="text-lg font-bold">🛠️ 작업 기록</h2>
                <div class="flex gap-1 p-1 bg-[#1a1c1e] rounded-lg">
                    <button onclick="setMode('입고')" id="modeIn" class="btn-toggle active-in px-4 py-2 rounded-md text-xs font-bold">원단입고</button>
                    <button onclick="setMode('공정')" id="modeProcess" class="btn-toggle px-4 py-2 rounded-md text-xs font-bold">재단완료</button>
                    <button onclick="setMode('출고')" id="modeOut" class="btn-toggle px-4 py-2 rounded-md text-xs font-bold">최종출고</button>
                </div>
            </div>

            <form id="mainForm" class="space-y-4">
                <input type="hidden" id="editId" value="">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="selectionArea" class="md:col-span-2 hidden">
                        <label class="block text-[10px] text-blue-400 mb-1 font-bold">기존 목록에서 선택</label>
                        <select id="itemSelector" onchange="bindSelectedItem(this)" class="input-field w-full p-4 rounded-lg border-2 border-blue-900">
                            <option value="">-- 선수 선택 --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">구단 선택</label>
                        <select id="teamNameSelect" onchange="toggleDirect(this)" class="input-field w-full p-3 rounded-lg">
                            <option value="">로딩 중...</option>
                        </select>
                        <input type="text" id="directBaseTeam" class="hidden input-field w-full p-3 rounded-lg mt-2" placeholder="직접 입력">
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">수량 <span id="maxLabel" class="text-red-400 ml-2"></span></label>
                        <input type="number" id="quantity" class="input-field w-full p-3 rounded-lg" placeholder="0" required>
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">배번</label>
                        <input type="text" id="playerNumber" class="input-field w-full p-3 rounded-lg" placeholder="예: 01">
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">선수 이름</label>
                        <input type="text" id="playerName" class="input-field w-full p-3 rounded-lg" placeholder="이름 입력">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button type="submit" id="submitBtn" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-lg">기록하기</button>
                    <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden w-24 bg-gray-600 text-white font-bold py-4 rounded-lg">취소</button>
                </div>
            </form>
        </section>

        <section class="card rounded-xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-[#32363c]">
                    <tr>
                        <th class="p-4 text-[10px] text-gray-400">구단 / [배번] 선수</th>
                        <th class="p-4 text-[10px] text-gray-400 text-right">미재단</th>
                        <th class="p-4 text-[10px] text-gray-400 text-right">가용</th>
                        <th class="p-4 text-[10px] text-gray-400 text-center">관리</th>
                    </tr>
                </thead>
                <tbody id="inventoryTable" class="divide-y divide-gray-800"></tbody>
            </table>
        </section>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx6knZYhoX_8ijppdCjoMUySLpB7Fz2HsEbniEbFNAuyuv03Hf0L8S14_MiFNGxhhwNWQ/exec"; 
        let currentMode = "입고";
        let rawData = [];
        let summary = {};

        async function init() {
            try {
                document.getElementById('status').innerText = "● SYNCING...";
                const res = await fetch(API_URL);
                const data = await res.json();
                rawData = data.inventory || [];
                
                // 구단 목록 업데이트
                const select = document.getElementById('teamNameSelect');
                select.innerHTML = '<option value="">-- 선택 --</option>';
                data.teams.forEach(t => select.innerHTML += `<option value="${t.name}">${t.name}</option>`);
                select.innerHTML += '<option value="direct">➕ 직접 입력</option>';

                calculateStock();
                document.getElementById('status').innerText = "● STABLE";
            } catch (e) { document.getElementById('status').innerText = "● ERROR"; }
        }

        function calculateStock() {
            summary = {};
            let rT = 0, aT = 0, oT = 0;

            rawData.forEach(item => {
                const key = `${item.team} | [${item.playerNumber}] ${item.playerName}`;
                if (!summary[key]) summary[key] = { raw: 0, available: 0, lastId: item.id };
                
                const amt = parseInt(item.amount) || 0;
                if (item.action === '입고') { summary[key].raw += amt; rT += amt; }
                else if (item.action === '공정') { summary[key].raw -= amt; summary[key].available += amt; rT -= amt; aT += amt; }
                else if (item.action === '출고') { summary[key].available -= amt; aT -= amt; oT += amt; }
                summary[key].lastId = item.id;
            });

            renderTable();
            document.getElementById('totalRaw').innerText = rT.toLocaleString();
            document.getElementById('totalAvailable').innerText = aT.toLocaleString();
            document.getElementById('totalOut').innerText = oT.toLocaleString();
            document.getElementById('totalAsset').innerText = (rT + aT).toLocaleString();
        }

        function renderTable() {
            const tbody = document.getElementById('inventoryTable');
            tbody.innerHTML = '';
            Object.keys(summary).sort().forEach(key => {
                const s = summary[key];
                tbody.innerHTML += `
                    <tr class="border-b border-gray-800">
                        <td class="p-4 text-sm">${key}</td>
                        <td class="p-4 text-sm text-right text-gray-500">${s.raw}</td>
                        <td class="p-4 text-sm text-right text-blue-400 font-bold">${s.available}</td>
                        <td class="p-4 text-center">
                            <button onclick="startEdit('${s.lastId}')" class="text-blue-400 text-xs mr-2">수정</button>
                            <button onclick="deleteRow('${s.lastId}')" class="text-red-400 text-xs">삭제</button>
                        </td>
                    </tr>`;
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('selectionArea').classList.toggle('hidden', mode === '입고');
            ['modeIn', 'modeProcess', 'modeOut'].forEach(id => document.getElementById(id).className = 'btn-toggle px-4 py-2 rounded-md text-xs font-bold');
            const targetId = mode === '입고' ? 'modeIn' : (mode === '공정' ? 'modeProcess' : 'modeOut');
            const colorClass = mode === '입고' ? 'active-in' : (mode === '공정' ? 'active-process' : 'active-out');
            document.getElementById(targetId).classList.add(colorClass);
            
            if(mode !== '입고') {
                const selector = document.getElementById('itemSelector');
                selector.innerHTML = '<option value="">-- 선수 선택 --</option>';
                Object.keys(summary).forEach(k => selector.innerHTML += `<option value="${k}">${k}</option>`);
            }
        }

        function bindSelectedItem(sel) {
            if(!sel.value) return;
            const parts = sel.value.split(' | ');
            const team = parts[0];
            const info = parts[1].match(/\[(.*?)\] (.*)/);
            document.getElementById('teamNameSelect').value = team;
            document.getElementById('playerNumber').value = info[1];
            document.getElementById('playerName').value = info[2];
        }

        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const team = document.getElementById('teamNameSelect').value === 'direct' ? 
                         document.getElementById('directBaseTeam').value : document.getElementById('teamNameSelect').value;

            const payload = {
                method: editId ? 'UPDATE' : 'INSERT',
                id: editId,
                team: team,
                playerNumber: document.getElementById('playerNumber').value,
                playerName: document.getElementById('playerName').value,
                amount: document.getElementById('quantity').value,
                action: currentMode
            };

            document.getElementById('submitBtn').disabled = true;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert('완료되었습니다.');
            location.reload();
        });

        async function deleteRow(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ method: 'DELETE', id: id }) });
            location.reload();
        }

        function toggleDirect(sel) { document.getElementById('directBaseTeam').classList.toggle('hidden', sel.value !== 'direct'); }
        function startEdit(id) {
            const item = rawData.find(d => d.id == id);
            if(!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('teamNameSelect').value = item.team;
            document.getElementById('playerNumber').value = item.playerNumber;
            document.getElementById('playerName').value = item.playerName;
            document.getElementById('quantity').value = item.amount;
            setMode(item.action);
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            window.scrollTo(0,0);
        }
        function resetForm() { location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
