<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marking-Kit Pro Ops v18.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; font-family: sans-serif; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; border-radius: 12px; }
        .input-field { background-color: #1a1c1e; border: 1px solid #4b5563; color: white; border-radius: 8px; padding: 10px; font-size: 14px; }
        .btn-toggle { background-color: #3f444c; color: #a1a1a1; font-weight: bold; border-radius: 8px; transition: 0.2s; }
        .active-in { background-color: #2563eb !important; color: white !important; }
        .active-process { background-color: #d97706 !important; color: white !important; }
        .active-out { background-color: #dc2626 !important; color: white !important; }
        .row-link { cursor: pointer; transition: 0.2s; }
        .row-link:hover { background-color: #363b42; }
        input:focus, select:focus { outline: 2px solid #2563eb; border-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-6 flex justify-between items-center text-blue-400">
            <h1 class="text-xl font-bold uppercase tracking-tighter">Marking-Kit Pro Ops v18.0</h1>
            <div id="status" class="text-[10px] font-mono italic">● READY</div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 rounded-xl text-center border-t-4 border-blue-500 shadow-lg">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold">미재단 원단</h3>
                <p class="text-2xl font-black mt-1" id="totalRaw">0</p>
            </div>
            <div class="card p-4 rounded-xl text-center border-t-4 border-yellow-500 shadow-lg">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold text-yellow-500/80">가용재고</h3>
                <p class="text-2xl font-black text-yellow-400 mt-1" id="totalAvailable">0</p>
            </div>
            <div class="card p-4 rounded-xl text-center border-t-4 border-green-500 shadow-lg">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold text-green-500/80">누적 출고</h3>
                <p class="text-2xl font-black text-green-400 mt-1" id="totalOut">0</p>
            </div>
            <div class="card p-4 rounded-xl text-center border-t-4 border-purple-500 shadow-lg">
                <h3 class="text-[10px] text-gray-400 uppercase font-bold text-purple-500/80">총 자산</h3>
                <p class="text-2xl font-black text-purple-400 mt-1" id="totalAsset">0</p>
            </div>
        </div>

        <section class="card p-6 shadow-2xl mb-8 border-l-8 transition-all" id="formContainer" style="border-color: #2563eb;">
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-2 p-1 bg-[#1a1c1e] rounded-lg w-fit border border-gray-700">
                    <button onclick="changeMode('입고')" id="btnIn" class="btn-toggle active-in px-6 py-2 text-xs">입고</button>
                    <button onclick="changeMode('공정')" id="btnProc" class="btn-toggle px-6 py-2 text-xs">재단</button>
                    <button onclick="changeMode('출고')" id="btnOut" class="btn-toggle px-6 py-2 text-xs">출고</button>
                </div>
                
                <div id="editIndicator" class="hidden flex items-center gap-2 bg-red-900/50 px-3 py-1 rounded-full border border-red-500">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                    </span>
                    <span class="text-[10px] font-bold text-red-200 uppercase tracking-widest">Edit Mode</span>
                </div>
            </div>

            <form id="mainForm" class="space-y-6">
                <input type="hidden" id="editIdx" value="">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">구단명 선택</label>
                        <select id="teamSelect" onchange="updateCollabOptions()" class="input-field w-full"></select>
                        <input type="text" id="manualTeam" class="input-field hidden mt-1 border-blue-500" placeholder="신규 구단 직접 입력">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">콜라보명 선택</label>
                        <select id="collabSelect" class="input-field w-full"></select>
                        <input type="text" id="manualCollab" class="input-field hidden mt-1 border-blue-500" placeholder="신규 콜라보 직접 입력">
                    </div>
                </div>

                <div class="grid grid-cols-3 md:grid-cols-4 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">배번</label>
                        <input type="text" id="pNum" class="input-field text-center font-bold" placeholder="00">
                    </div>
                    <div class="col-span-2 flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">선수 이름</label>
                        <input type="text" id="pName" class="input-field" placeholder="이름 입력">
                    </div>
                    <div class="col-span-3 md:col-span-1 flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">수량 <span id="maxQty" class="text-red-500 ml-1"></span></label>
                        <input type="number" id="qty" class="input-field font-bold text-blue-400" placeholder="0" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-white text-base shadow-lg transition-all active:scale-95">데이터 기록 저장하기</button>
                    <button type="button" onclick="resetForm()" class="w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-xl font-bold text-white text-base shadow-lg transition-all active:scale-95 text-gray-300">입력창 초기화</button>
                </div>
            </form>
        </section>

        <section class="card overflow-hidden">
            <div class="p-4 bg-[#32363c] flex justify-between items-center gap-4 border-b border-gray-700">
                <input type="text" id="searchBar" oninput="renderTable()" class="input-field w-full md:w-80 text-xs" placeholder="항목 검색 (구단, 선수, 콜라보)...">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="bg-[#1a1c1e] text-gray-500 border-b border-gray-800 font-bold uppercase">
                            <th class="p-4">항목 (클릭 시 수정)</th>
                            <th class="p-4 text-right">미재단</th>
                            <th class="p-4 text-right text-yellow-500">가용</th>
                            <th class="p-4 text-center">동작</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-800"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // GAS 웹 앱 배포 URL을 여기에 넣으세요
        const API_URL = "https://script.google.com/macros/s/AKfycbxnoAgwGyy4KSE7izHyCulwBPgVAale15KEL1DKOMqSXRiutFbTimvGAsvR3lsMgB0B_A/exec"; 
        let db = { inbound:[], process:[], outbound:[], teams:[], collabs:[] };
        let curMode = "입고";
        let isEditMode = false;

        async function init() {
            try {
                document.getElementById('status').innerText = "● SYNCING...";
                const res = await fetch(API_URL);
                db = await res.json();
                updateFormOptions();
                renderTable();
                document.getElementById('status').innerText = "● ONLINE";
            } catch (e) { document.getElementById('status').innerText = "● ERROR"; }
        }

        function changeMode(m) {
            if(isEditMode) return; // 수정 모드일 때는 탭 전환 방지 (데이터 일관성)
            curMode = m;
            const btns = { '입고':'btnIn', '공정':'btnProc', '출고':'btnOut' };
            const clss = { '입고':'active-in', '공정':'active-process', '출고':'active-out' };
            Object.values(btns).forEach(id => document.getElementById(id).className = "btn-toggle px-6 py-2 text-xs");
            document.getElementById(btns[m]).classList.add(clss[m]);
            
            const submitBtn = document.getElementById('submitBtn');
            const container = document.getElementById('formContainer');
            
            if(m === '공정') {
                submitBtn.className = "w-full bg-amber-600 hover:bg-amber-500 py-4 rounded-xl font-black text-white text-base shadow-lg transition-all active:scale-95";
                container.style.borderColor = "#d97706";
            } else if(m === '출고') {
                submitBtn.className = "w-full bg-red-600 hover:bg-red-500 py-4 rounded-xl font-black text-white text-base shadow-lg transition-all active:scale-95";
                container.style.borderColor = "#dc2626";
            } else {
                submitBtn.className = "w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-white text-base shadow-lg transition-all active:scale-95";
                container.style.borderColor = "#2563eb";
            }
            updateFormOptions();
        }

        function updateFormOptions() {
            const tSel = document.getElementById('teamSelect');
            const cSel = document.getElementById('collabSelect');
            const mTeam = document.getElementById('manualTeam');
            const mCollab = document.getElementById('manualCollab');

            tSel.innerHTML = '<option value="">-- 구단 선택 --</option>';
            cSel.innerHTML = '<option value="">-- 콜라보 선택 --</option>';

            if (curMode === '입고') {
                db.teams.forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
                tSel.innerHTML += '<option value="direct">➕ 직접 입력</option>';
            } else {
                const source = curMode === '공정' ? db.inbound : db.process;
                const uniqueTeams = [...new Set(source.map(item => item.team))];
                uniqueTeams.forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
            }
            mTeam.classList.add('hidden'); 
            mCollab.classList.add('hidden');
            cSel.classList.remove('hidden');
        }

        function updateCollabOptions() {
            const tVal = document.getElementById('teamSelect').value;
            const cSel = document.getElementById('collabSelect');
            const mTeam = document.getElementById('manualTeam');
            const mCollab = document.getElementById('manualCollab');

            if (tVal === 'direct') {
                cSel.classList.add('hidden');
                mTeam.classList.remove('hidden');
                mCollab.classList.remove('hidden');
                cSel.value = ""; 
            } else {
                cSel.classList.remove('hidden');
                mTeam.classList.add('hidden');
                mCollab.classList.add('hidden');
                
                cSel.innerHTML = '<option value="">-- 콜라보 선택 --</option>';
                if (tVal !== "") {
                    if(curMode === '입고') {
                        db.collabs.forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
                        cSel.innerHTML += '<option value="direct">➕ 직접 입력</option>';
                    } else {
                        const source = curMode === '공정' ? db.inbound : db.process;
                        const filteredCollabs = [...new Set(source.filter(i => i.team === tVal).map(i => i.collab))];
                        filteredCollabs.forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
                    }
                }
            }
        }

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            const search = document.getElementById('searchBar').value.toLowerCase();
            tbody.innerHTML = '';
            
            let summary = {};
            let totalRaw = 0, totalAvailable = 0, totalOut = 0;
            const allData = [...db.inbound, ...db.process, ...db.outbound];
            
            allData.forEach(item => {
                const qty = Number(item.qty);
                if(item.action === '입고') totalRaw += qty;
                else if(item.action === '공정') { totalRaw -= qty; totalAvailable += qty; }
                else if(item.action === '출고') { totalAvailable -= qty; totalOut += qty; }

                const key = `${item.team}|${item.collab}|${item.num}|${item.name}`;
                if(!summary[key]) {
                    summary[key] = { raw:0, available:0, team:item.team, collab:item.collab, num:String(item.num), name:item.name, idx:item.idx, lastQty: qty };
                }
                
                if(item.action === '입고') summary[key].raw += qty;
                else if(item.action === '공정') { summary[key].raw -= qty; summary[key].available += qty; }
                else if(item.action === '출고') summary[key].available -= qty;
                
                summary[key].lastIdx = item.idx; 
                summary[key].lastQty = qty;
            });

            document.getElementById('totalRaw').innerText = totalRaw.toLocaleString();
            document.getElementById('totalAvailable').innerText = totalAvailable.toLocaleString();
            document.getElementById('totalOut').innerText = totalOut.toLocaleString();
            document.getElementById('totalAsset').innerText = (totalRaw + totalAvailable).toLocaleString();

            Object.keys(summary).forEach(key => {
                if(key.toLowerCase().includes(search)) {
                    const s = summary[key];
                    const tr = document.createElement('tr');
                    tr.className = "row-link";
                    // 💡 여기에 수정 시 필요한 모든 정보와 'idx'를 인자로 전달합니다.
                    tr.innerHTML = `<td class="p-4" onclick="fillForm('${s.team.replace(/'/g, "\\'")}','${s.collab.replace(/'/g, "\\'")}','${s.num}','${s.name.replace(/'/g, "\\'")}','${s.lastQty}','${s.lastIdx}')">
                            <span class="text-blue-400 font-bold">${s.team}</span> <span class="text-[10px] text-gray-500">${s.collab}</span> <br>
                            <span class="text-gray-300 font-mono font-bold">[${s.num}]</span> <span class="text-white">${s.name}</span>
                        </td>
                        <td class="p-4 text-right text-gray-400 font-mono">${s.raw}</td>
                        <td class="p-4 text-right text-yellow-500 font-bold font-mono">${s.available}</td>
                        <td class="p-4 text-center">
                            <button onclick="event.stopPropagation(); deleteRow('${s.lastIdx}')" class="px-3 py-1 bg-red-900/30 text-red-500 rounded hover:bg-red-500 hover:text-white transition-colors">삭제</button>
                        </td>`;
                    tbody.appendChild(tr);
                }
            });
        }

        // 💡 수정 모드 활성화 및 데이터 채우기
        function fillForm(team, collab, num, name, qty, idx) {
            isEditMode = true;
            document.getElementById('editIdx').value = idx;
            document.getElementById('editIndicator').classList.remove('hidden');
            document.getElementById('formContainer').style.borderColor = "#ef4444"; // 수정 모드 전용 레드 컬러
            document.getElementById('submitBtn').innerText = "기존 데이터 수정하기 (UPDATE)";
            document.getElementById('submitBtn').className = "w-full bg-red-600 hover:bg-red-500 py-4 rounded-xl font-black text-white text-base shadow-lg transition-all active:scale-95";

            // 폼 데이터 바인딩
            document.getElementById('teamSelect').value = team;
            updateCollabOptions();
            document.getElementById('collabSelect').value = collab;
            document.getElementById('pNum').value = String(num);
            document.getElementById('pName').value = name;
            document.getElementById('qty').value = qty;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            isEditMode = false;
            document.getElementById('editIdx').value = "";
            document.getElementById('mainForm').reset();
            document.getElementById('editIndicator').classList.add('hidden');
            document.getElementById('submitBtn').innerText = "데이터 기록 저장하기";
            changeMode(curMode); // UI 컬러 원복
        }

        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalBtnText = btn.innerText;
            
            const payload = {
                method: isEditMode ? 'UPDATE' : 'INSERT',
                idx: document.getElementById('editIdx').value,
                action: curMode,
                team: document.getElementById('teamSelect').value === 'direct' ? document.getElementById('manualTeam').value : document.getElementById('teamSelect').value,
                collab: (document.getElementById('teamSelect').value === 'direct' || document.getElementById('collabSelect').value === 'direct') ? document.getElementById('manualCollab').value : document.getElementById('collabSelect').value,
                num: String(document.getElementById('pNum').value),
                name: document.getElementById('pName').value,
                qty: document.getElementById('qty').value
            };

            if(!payload.team || !payload.collab || !payload.qty) { alert("필수 항목을 모두 입력하세요."); return; }

            btn.disabled = true; 
            btn.innerText = isEditMode ? "데이터 수정 중..." : "새로운 데이터 저장 중...";
            
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                // 구글 시트 저장 시간을 고려하여 약간의 지연 후 리로드
                setTimeout(() => location.reload(), 800);
            } catch (err) {
                alert("서버 통신 오류가 발생했습니다.");
                btn.disabled = false;
                btn.innerText = originalBtnText;
            }
        });

        function deleteRow(idx) { 
            if(confirm("이 기록을 정말로 삭제하시겠습니까?")) {
                document.getElementById('status').innerText = "● DELETING...";
                fetch(API_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({method:'DELETE',idx:idx})})
                .then(()=>setTimeout(() => location.reload(), 500)); 
            }
        }

        window.onload = init;
    </script>
</body>
</html>
