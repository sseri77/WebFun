<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Marking-Kit Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; }
        .input-field { background-color: #1a1c1e; border: 1px solid #3f444c; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Smart Marking-Kit Ops</h1>
                <p class="text-gray-400 text-sm">관리 시스템 v1.2 (실시간 동기화)</p>
            </div>
            <div id="connectionStatus" class="text-xs text-green-500 font-mono italic">● DATA SYNCED</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card p-6 rounded-xl shadow-lg">
                <h3 class="text-gray-400 text-xs mb-1 uppercase font-semibold">보유원단 총계</h3>
                <p class="text-3xl font-bold" id="totalRaw">0</p>
            </div>
            <div class="card p-6 rounded-xl shadow-lg border-l-4 border-green-500">
                <h3 class="text-gray-400 text-xs mb-1 uppercase font-semibold">완성품 총계</h3>
                <p class="text-3xl font-bold text-green-400" id="totalProduct">0</p>
            </div>
            <div class="card p-6 rounded-xl shadow-lg border-l-4 border-red-500">
                <h3 class="text-gray-400 text-xs mb-1 uppercase font-semibold">불량 총계</h3>
                <p class="text-3xl font-bold text-red-400" id="totalBad">0</p>
            </div>
        </div>

        <section class="card p-6 rounded-xl mb-8 shadow-2xl">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="mr-2">📥</span> 데이터 입력
            </h2>
            <form id="inboundForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">구단 선택</label>
                        <select id="teamNameSelect" onchange="toggleDirectInput(this)" class="input-field w-full p-3 rounded-lg outline-none focus:border-blue-500">
                            <option value="LG">LG 트윈스</option>
                            <option value="한화">한화 이글스</option>
                            <option value="삼성">삼성 라이온즈</option>
                            <option value="롯데">롯데 자이언츠</option>
                            <option value="direct">➕ 직접 입력(신규 구단)</option>
                        </select>
                        <input type="text" id="directTeamInput" class="input-field w-full p-3 mt-2 rounded-lg hidden" placeholder="새로운 구단명을 입력하세요">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">수량</label>
                        <input type="number" id="quantity" class="input-field w-full p-3 rounded-lg outline-none focus:border-blue-500" placeholder="0">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all active:scale-95">
                    데이터 전송
                </button>
            </form>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex justify-between items-center">
                <span>실시간 현황</span>
                <button onclick="fetchInventory()" class="text-xs text-blue-400 hover:underline">🔄 새로고침</button>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left card rounded-xl">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="p-4 text-sm font-semibold text-gray-400">구단명</th>
                            <th class="p-4 text-sm font-semibold text-gray-400 text-right">보유원단</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API_URL = "/api/inbound";

        // 1. [기능] 구단별 데이터 불러오기 (Read)
        async function fetchInventory() {
            try {
                const res = await fetch(API_URL, { method: 'GET' }); // 서버에 데이터 요청
                const data = await res.json();
                
                const summary = {};
                let grandTotal = 0;

                // 데이터 가공: 구단별로 합산
                data.forEach(item => {
                    const amount = parseInt(item.amount) || 0;
                    summary[item.team] = (summary[item.team] || 0) + amount;
                    grandTotal += amount;
                });

                // 상단 카드 업데이트
                document.getElementById('totalRaw').innerText = grandTotal.toLocaleString();
                
                // 테이블 업데이트
                const tableBody = document.getElementById('inventoryTable');
                tableBody.innerHTML = '';
                
                Object.keys(summary).forEach(team => {
                    const row = `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                        <td class="p-4 text-sm">${team}</td>
                        <td class="p-4 text-sm text-right font-mono">${summary[team].toLocaleString()}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

            } catch (err) {
                console.error("데이터 로드 실패:", err);
            }
        }

        // 2. [기능] 구단 선택 제어
        function toggleDirectInput(select) {
            const directInput = document.getElementById('directTeamInput');
            if (select.value === 'direct') {
                directInput.classList.remove('hidden');
                directInput.focus();
            } else {
                directInput.classList.add('hidden');
                directInput.value = "";
            }
        }

        // 3. [기능] 데이터 전송 (Create)
        document.getElementById('inboundForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selectVal = document.getElementById('teamNameSelect').value;
            const directVal = document.getElementById('directTeamInput').value;
            const qty = document.getElementById('quantity').value;
            const finalTeamName = (selectVal === 'direct') ? directVal : selectVal;

            if(!finalTeamName || !qty) return alert('입력 내용을 확인해 주세요.');

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "전송 중...";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: '입고', team: finalTeamName, amount: parseInt(qty) })
                });
                alert('기록 완료!');
                e.target.reset();
                document.getElementById('directTeamInput').classList.add('hidden');
                fetchInventory(); // 전송 후 즉시 목록 갱신
            } catch (err) {
                alert('전송 실패');
            } finally {
                btn.disabled = false;
                btn.innerText = "데이터 전송";
            }
        });

        // 페이지 접속 시 자동으로 데이터 불러오기
        window.onload = fetchInventory;
    </script>
</body>
</html>
