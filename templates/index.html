<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marking-Kit Pro Ops v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; font-family: sans-serif; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; }
        .input-field { background-color: #1a1c1e; border: 1px solid #3f444c; color: white; }
        .hidden { display: none; }
        .btn-toggle { background-color: #3f444c; color: #a1a1a1; transition: all 0.2s; }
        .active-in { background-color: #2563eb !important; color: white !important; border: 2px solid #60a5fa; }
        .active-process { background-color: #d97706 !important; color: white !important; border: 2px solid #fbbf24; }
        .active-out { background-color: #dc2626 !important; color: white !important; border: 2px solid #f87171; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Marking-Kit Pro Ops</h1>
                <p class="text-gray-400 text-sm">마스터 자동 학습 시스템 v4.5</p>
            </div>
            <div id="status" class="text-xs text-blue-500 font-mono italic">● CONNECTING...</div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 rounded-xl shadow-lg border-t-4 border-blue-500 text-center">
                <h3 class="text-gray-400 text-[10px] mb-1 font-semibold uppercase">미재단 원단</h3>
                <p class="text-2xl font-bold" id="totalRaw">0</p>
            </div>
            <div class="card p-4 rounded-xl shadow-lg border-t-4 border-yellow-500 text-center">
                <h3 class="text-gray-400 text-[10px] mb-1 font-semibold uppercase">가용재고</h3>
                <p class="text-2xl font-bold text-yellow-400" id="totalAvailable">0</p>
            </div>
            <div class="card p-4 rounded-xl shadow-lg border-t-4 border-green-500 text-center">
                <h3 class="text-gray-400 text-[10px] mb-1 font-semibold uppercase">누적 출고</h3>
                <p class="text-2xl font-bold text-green-400" id="totalOut">0</p>
            </div>
            <div class="card p-4 rounded-xl shadow-lg border-t-4 border-purple-500 text-center">
                <h3 class="text-gray-400 text-[10px] mb-1 font-semibold uppercase">총 자산</h3>
                <p class="text-2xl font-bold text-purple-400" id="totalAsset">0</p>
            </div>
        </div>

        <div class="mb-6 relative">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="구단, 콜라보, 선수 통합 검색..." 
                   class="input-field w-full p-4 pl-10 rounded-xl outline-none focus:border-blue-500 transition-all text-sm">
            <span class="absolute left-3 top-4">🔍</span>
        </div>

        <section class="card p-6 rounded-xl mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <h2 class="text-lg font-bold">🛠️ 작업 기록</h2>
                <div class="flex gap-1 p-1 bg-[#1a1c1e] rounded-lg w-full md:w-auto">
                    <button type="button" id="modeIn" onclick="setMode('입고')" class="btn-toggle active-in flex-1 px-4 py-2 rounded-md text-xs font-bold">원단입고</button>
                    <button type="button" id="modeProcess" onclick="setMode('공정')" class="btn-toggle flex-1 px-4 py-2 rounded-md text-xs font-bold">재단완료</button>
                    <button type="button" id="modeOut" onclick="setMode('출고')" class="btn-toggle flex-1 px-4 py-2 rounded-md text-xs font-bold">최종출고</button>
                </div>
            </div>

            <form id="mainForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="selectionArea" class="md:col-span-2 hidden">
                        <label class="block text-xs text-blue-400 mb-1 font-bold">기존 목록에서 선택 (오타 방지)</label>
                        <select id="itemSelector" onchange="bindSelectedItem(this)" class="input-field w-full p-4 rounded-lg outline-none border-2 border-blue-900">
                            <option value="">-- 선수 선택 --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">구단 / 콜라보 선택</label>
                        <select id="teamNameSelect" onchange="toggleDirect(this)" class="input-field w-full p-3 rounded-lg outline-none">
                            <option value="">불러오는 중...</option>
                        </select>
                        <div id="directInputGroup" class="hidden space-y-2 mt-2 p-3 bg-gray-800/50 rounded-lg border border-blue-500/30">
                            <input type="text" id="directBaseTeam" class="input-field w-full p-3 rounded-lg" placeholder="구단명 (예: LG)">
                            <input type="text" id="directCollab" class="input-field w-full p-3 rounded-lg" placeholder="콜라보명 (예: 숀) - 없으면 비움">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">수량 <span id="maxLabel" class="text-red-400 font-bold ml-2"></span></label>
                        <input type="number" id="quantity" class="input-field w-full p-3 rounded-lg outline-none focus:border-blue-500" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">배번</label>
                        <input type="number" id="playerNumber" class="input-field w-full p-3 rounded-lg outline-none" placeholder="00">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">선수 이름</label>
                        <input type="text" id="playerName" class="input-field w-full p-3 rounded-lg outline-none" placeholder="이름 입력">
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg active:scale-95 transition-all">기록하기</button>
            </form>
        </section>

        <section>
            <div class="overflow-x-auto">
                <table class="w-full text-left card rounded-xl">
                    <thead class="bg-[#32363c]">
                        <tr>
                            <th class="p-4 text-[11px] text-gray-400 uppercase">구단 / 콜라보 / [번호] 선수</th>
                            <th class="p-4 text-[11px] text-gray-400 text-right">미재단</th>
                            <th class="p-4 text-[11px] text-gray-400 text-right">가용</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API_URL = "/api/inbound"; 
        let currentMode = "입고";
        let currentSummary = {};
        let masterTeams = [];

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('selectionArea').classList.toggle('hidden', mode === '입고');
            document.getElementById('maxLabel').innerText = "";
            
            const config = {
                '입고': { class: 'active-in', text: '원단 입고 기록', color: 'bg-blue-600' },
                '공정': { class: 'active-process', text: '재단 공정 완료', color: 'bg-yellow-600' },
                '출고': { class: 'active-out', text: '최종 출고 처리', color: 'bg-red-600' }
            };

            ['modeIn', 'modeProcess', 'modeOut'].forEach(id => document.getElementById(id).classList.remove('active-in', 'active-process', 'active-out'));
            document.getElementById(`mode${mode === '입고' ? 'In' : (mode === '공정' ? 'Process' : 'Out')}`).classList.add(config[mode].class);
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = config[mode].text;
            submitBtn.className = `w-full ${config[mode].color} text-white font-bold py-4 rounded-lg active:scale-95 transition-all`;
            
            if(mode !== '입고') updateSelector();
        }

        function toggleDirect(sel) {
            const group = document.getElementById('directInputGroup');
            group.classList.toggle('hidden', sel.value !== 'direct');
        }

        function renderTeamSelect() {
            const select = document.getElementById('teamNameSelect');
            select.innerHTML = '<option value="">-- 선택하세요 --</option>';
            masterTeams.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.name;
                opt.innerText = t.name;
                select.appendChild(opt);
            });
            const directOpt = document.createElement('option');
            directOpt.value = 'direct';
            directOpt.innerText = '➕ 직접 입력(신규 구단)';
            select.appendChild(directOpt);
        }

        function bindSelectedItem(sel) {
            if(!sel.value) return;
            const [team, num, name] = sel.value.split('|');
            document.getElementById('teamNameSelect').value = team;
            document.getElementById('playerNumber').value = num;
            document.getElementById('playerName').value = name;
            
            const key = `${team} | [${num}] ${name}`;
            const stock = currentSummary[key] || { raw: 0, available: 0 };
            const maxQty = (currentMode === '공정') ? stock.raw : stock.available;
            document.getElementById('maxLabel').innerText = `(현재고: ${maxQty}개)`;
            document.getElementById('quantity').focus();
        }

        function updateSelector() {
            const selector = document.getElementById('itemSelector');
            selector.innerHTML = '<option value="">-- 기존 목록에서 선수 선택 --</option>';
            Object.keys(currentSummary).sort().forEach(key => {
                const [teamPart, playerPart] = key.split(' | ');
                const num = playerPart.match(/\[(.*?)\]/)[1];
                const name = playerPart.split('] ')[1];
                const opt = document.createElement('option');
                opt.value = `${teamPart}|${num}|${name}`;
                opt.innerText = key;
                selector.appendChild(opt);
            });
        }

        async function fetchAllData() {
            try {
                document.getElementById('status').innerText = "● SYNCING...";
                const res = await fetch(API_URL);
                const result = await res.json();
                
                masterTeams = result.teams;
                renderTeamSelect();

                currentSummary = {};
                let rT = 0, aT = 0, oT = 0;
                result.inventory.forEach(item => {
                    const amt = parseInt(item.amount) || 0;
                    const key = `${item.team} | [${item.playerNumber || '0'}] ${item.playerName || '미지정'}`;
                    if (!currentSummary[key]) currentSummary[key] = { raw: 0, available: 0 };
                    if (item.action === '입고') { currentSummary[key].raw += amt; rT += amt; }
                    else if (item.action === '공정') { currentSummary[key].raw -= amt; currentSummary[key].available += amt; rT -= amt; aT += amt; }
                    else if (item.action === '출고') { currentSummary[key].available -= amt; aT -= amt; oT += amt; }
                });

                document.getElementById('totalRaw').innerText = rT.toLocaleString();
                document.getElementById('totalAvailable').innerText = aT.toLocaleString();
                document.getElementById('totalOut').innerText = oT.toLocaleString();
                document.getElementById('totalAsset').innerText = (rT + aT).toLocaleString();
                
                const tableBody = document.getElementById('inventoryTable');
                tableBody.innerHTML = '';
                Object.keys(currentSummary).sort().forEach(key => {
                    const row = currentSummary[key];
                    tableBody.innerHTML += `
                        <tr class="border-b border-gray-800">
                            <td class="p-4 text-sm font-medium">${key}</td>
                            <td class="p-4 text-sm text-right font-mono text-gray-500">${row.raw}</td>
                            <td class="p-4 text-sm text-right font-mono text-blue-400 font-bold">${row.available}</td>
                        </tr>`;
                });
                document.getElementById('status').innerText = "● STABLE";
            } catch (err) { 
                document.getElementById('status').innerText = "● ERROR";
            }
        }

        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const teamSelect = document.getElementById('teamNameSelect').value;
            let baseTeam = "";
            let collabName = "";
            let finalFullName = "";

            if (teamSelect === 'direct') {
                baseTeam = document.getElementById('directBaseTeam').value;
                collabName = document.getElementById('directCollab').value;
                finalFullName = collabName ? `${baseTeam} ${collabName}` : baseTeam;
            } else {
                finalFullName = teamSelect;
                const parts = teamSelect.split(' ');
                baseTeam = parts[0];
                collabName = parts.slice(1).join(' ');
            }

            const qty = parseInt(document.getElementById('quantity').value) || 0;
            const num = document.getElementById('playerNumber').value;
            const name = document.getElementById('playerName').value;
            const key = `${finalFullName} | [${num}] ${name}`;

            if (currentMode !== '입고') {
                const limit = (currentMode === '공정') ? (currentSummary[key]?.raw || 0) : (currentSummary[key]?.available || 0);
                if (qty > limit) return alert(`수량 초과! 최대 ${limit}개 가능합니다.`);
            }
            if(!finalFullName || qty <= 0) return alert('항목과 수량을 확인하세요.');

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "처리 중...";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: currentMode, 
                        team: finalFullName,
                        baseTeam: baseTeam,
                        collabName: collabName,
                        amount: qty, 
                        playerNumber: num, 
                        playerName: name 
                    })
                });
                alert('기록 완료!');
                document.getElementById('quantity').value = "";
                if(teamSelect === 'direct') {
                    location.reload(); // 신규 구단 등록 시 목록 갱신을 위해 리로드
                } else {
                    fetchAllData();
                }
            } catch (err) { alert('오류가 발생했습니다.'); }
            finally { btn.disabled = false; setMode(currentMode); }
        });

        window.onload = fetchAllData;

        function filterTable() {
            const filter = document.getElementById('searchInput').value.toUpperCase();
            const trs = document.getElementById('inventoryTable').getElementsByTagName('tr');
            for (let tr of trs) {
                const txt = tr.getElementsByTagName('td')[0].textContent || tr.innerText;
                tr.style.display = txt.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
