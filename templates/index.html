<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Marking-Kit Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; font-family: sans-serif; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; }
        .input-field { background-color: #1a1c1e; border: 1px solid #3f444c; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Smart Marking-Kit Ops</h1>
                <p class="text-gray-400 text-sm">재고 관리 시스템 v1.5</p>
            </div>
            <div id="syncStatus" class="text-xs text-green-500 font-mono italic">● DATA SYNCED</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card p-6 rounded-xl shadow-lg">
                <h3 class="text-gray-400 text-xs mb-1 uppercase font-semibold">보유원단 총계</h3>
                <p class="text-3xl font-bold" id="totalRaw">0</p>
            </div>
            <div class="card p-6 rounded-xl shadow-lg border-l-4 border-green-500">
                <h3 class="text-gray-400 text-xs mb-1 uppercase font-semibold">완성품 총계</h3>
                <p class="text-3xl font-bold text-green-400">0</p>
            </div>
            <div class="card p-6 rounded-xl shadow-lg border-l-4 border-red-500">
                <h3 class="text-gray-400 text-xs mb-1 uppercase font-semibold">불량 총계</h3>
                <p class="text-3xl font-bold text-red-400">0</p>
            </div>
        </div>

        <section class="card p-6 rounded-xl mb-8 shadow-2xl">
            <h2 class="text-lg font-bold mb-4 flex items-center">📥 데이터 입력</h2>
            <form id="inboundForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">구단 선택</label>
                        <select id="teamNameSelect" onchange="toggleDirectInput(this)" class="input-field w-full p-3 rounded-lg outline-none focus:border-blue-500">
                            <option value="LG">LG 트윈스</option>
                            <option value="한화">한화 이글스</option>
                            <option value="삼성">삼성 라이온즈</option>
                            <option value="롯데">롯데 자이언츠</option>
                            <option value="direct">➕ 직접 입력</option>
                        </select>
                        <input type="text" id="directTeamInput" class="input-field w-full p-3 mt-2 rounded-lg hidden" placeholder="구단명 입력">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">수량</label>
                        <input type="number" id="quantity" class="input-field w-full p-3 rounded-lg outline-none focus:border-blue-500" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">배번 (번호)</label>
                        <input type="number" id="playerNumber" class="input-field w-full p-3 rounded-lg outline-none focus:border-blue-500" placeholder="00">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">선수 이름</label>
                        <input type="text" id="playerName" class="input-field w-full p-3 rounded-lg outline-none focus:border-blue-500" placeholder="이름 입력">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all active:scale-95">데이터 기록</button>
            </form>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex justify-between items-center">
                <span>실시간 재고 현황</span>
                <button onclick="fetchInventory()" class="text-xs text-blue-400 hover:underline">🔄 새로고침</button>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left card rounded-xl">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="p-4 text-sm font-semibold text-gray-400">구단 / [번호] 선수명</th>
                            <th class="p-4 text-sm font-semibold text-gray-400 text-right">수량</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <tr><td colspan="2" class="p-4 text-center text-gray-500">데이터 로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API_URL = "/api/inbound";

        async function fetchInventory() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const summary = {};
                let grandTotal = 0;

                data.forEach(item => {
                    const amount = parseInt(item.amount) || 0;
                    // [번호] 선수명 순서로 표시 형식 변경
                    const key = `${item.team} | [${item.playerNumber || '0'}] ${item.playerName || '선수미정'}`;
                    summary[key] = (summary[key] || 0) + amount;
                    grandTotal += amount;
                });

                document.getElementById('totalRaw').innerText = grandTotal.toLocaleString();
                
                const tableBody = document.getElementById('inventoryTable');
                tableBody.innerHTML = '';
                
                Object.keys(summary).sort().forEach(key => {
                    tableBody.innerHTML += `
                        <tr class="border-b border-gray-800 hover:bg-gray-800/30">
                            <td class="p-4 text-sm">${key}</td>
                            <td class="p-4 text-sm text-right font-mono text-blue-300">${summary[key].toLocaleString()}</td>
                        </tr>`;
                });
            } catch (err) {
                console.error("불러오기 실패:", err);
            }
        }

        function toggleDirectInput(select) {
            const directInput = document.getElementById('directTeamInput');
            directInput.classList.toggle('hidden', select.value !== 'direct');
            if(select.value === 'direct') directInput.focus();
        }

        document.getElementById('inboundForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selectVal = document.getElementById('teamNameSelect').value;
            const finalTeamName = selectVal === 'direct' ? document.getElementById('directTeamInput').value : selectVal;
            const qty = document.getElementById('quantity').value;

            if(!finalTeamName || !qty) return alert('구단과 수량을 입력하세요.');

            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = "전송 중...";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: '입고',
                        team: finalTeamName,
                        amount: parseInt(qty),
                        playerNumber: document.getElementById('playerNumber').value, // 순서 변경
                        playerName: document.getElementById('playerName').value
                    })
                });
                alert('기록 성공!');
                e.target.reset();
                fetchInventory();
            } catch (err) {
                alert('전송 실패');
            } finally {
                btn.disabled = false; btn.innerText = "데이터 기록";
            }
        });

        window.onload = fetchInventory;
    </script>
</body>
</html>
