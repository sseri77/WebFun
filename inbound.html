<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbound Management - Marking-Kit Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c1e; color: #e2e2e2; font-family: sans-serif; }
        .card { background-color: #2a2d31; border: 1px solid #3f444c; border-radius: 12px; }
        .input-field { background-color: #1a1c1e; border: 1px solid #4b5563; color: white; border-radius: 8px; padding: 10px; font-size: 14px; }
        .row-link:hover { background-color: #363b42; cursor: pointer; }
        input:focus, select:focus { outline: 2px solid #2563eb; border-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8">
    <script src="common.js"></script>

    <div id="content-area" class="max-w-5xl mx-auto">
        <section class="card p-6 shadow-2xl mb-8 border-l-8 border-blue-600 transition-all">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-black text-blue-400 uppercase tracking-widest">Inbound Registration</h2>
                <div id="editIndicator" class="hidden flex items-center gap-2 bg-yellow-900/50 px-3 py-1 rounded-full border border-yellow-500">
                    <span class="text-[10px] font-bold text-yellow-200 uppercase tracking-widest">Edit Mode</span>
                </div>
            </div>

            <form id="inboundForm" class="space-y-6">
                <input type="hidden" id="editIdx" value="">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Team Selection</label>
                        <select id="teamSelect" onchange="updateCollabOptions()" class="input-field w-full"></select>
                        <input type="text" id="manualTeam" class="input-field hidden mt-1 border-blue-500" placeholder="신규 구단 직접 입력">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Collaboration</label>
                        <select id="collabSelect" class="input-field w-full"></select>
                        <input type="text" id="manualCollab" class="input-field hidden mt-1 border-blue-500" placeholder="신규 콜라보 직접 입력">
                    </div>
                </div>

                <div class="grid grid-cols-3 md:grid-cols-4 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">No.</label>
                        <input type="text" id="pNum" class="input-field text-center font-bold" placeholder="00">
                    </div>
                    <div class="col-span-2 flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Player Name</label>
                        <input type="text" id="pName" class="input-field" placeholder="선수 이름 입력">
                    </div>
                    <div class="col-span-3 md:col-span-1 flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Quantity</label>
                        <input type="number" id="qty" class="input-field font-bold text-blue-400" placeholder="0" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-white shadow-lg transition-all active:scale-95">입고 데이터 저장하기</button>
                    <button type="button" onclick="resetForm()" class="w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-xl font-bold text-gray-300 shadow-lg transition-all active:scale-95">입력창 초기화</button>
                </div>
            </form>
        </section>

        <section class="card overflow-hidden">
            <div class="p-4 bg-[#32363c] flex justify-between items-center border-b border-gray-700">
                <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">미재단 입고 잔량 리스트</span>
                <input type="text" id="searchBar" oninput="renderTable()" class="input-field w-48 md:w-64 text-xs py-1" placeholder="검색...">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="bg-[#1a1c1e] text-gray-500 border-b border-gray-800 font-bold">
                            <th class="p-4">내역 (클릭 시 수정)</th>
                            <th class="p-4 text-right">잔여 수량</th>
                            <th class="p-4 text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-800"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let db = { inbound:[], process:[], outbound:[], teams:[], collabs:[] };

        async function init() {
            injectNavbar('inbound');
            db = await fetchAllData();
            if (!db) return alert("데이터를 불러올 수 없습니다.");
        
            updateFormOptions();
            renderTable();
        }
        
        function updateFormOptions() {
            const tSel = document.getElementById('teamSelect');
            tSel.innerHTML = '<option value="">-- 구단 선택 --</option>';
            db.teams.forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
            tSel.innerHTML += '<option value="direct">➕ 직접 입력</option>';
            updateCollabOptions();
        }
        
        function updateCollabOptions() {
            const tVal = document.getElementById('teamSelect').value;
            const cSel = document.getElementById('collabSelect');
            const mTeam = document.getElementById('manualTeam');
            const mCollab = document.getElementById('manualCollab');
        
            if (tVal === 'direct') {
                cSel.classList.add('hidden'); 
                mTeam.classList.remove('hidden'); 
                mCollab.classList.remove('hidden');
            } else {
                cSel.classList.remove('hidden'); 
                mTeam.classList.add('hidden'); 
                mCollab.classList.add('hidden');
                cSel.innerHTML = '<option value="">-- 콜라보 선택 --</option>';
                if (tVal !== "") {
                    db.collabs.forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
                    cSel.innerHTML += '<option value="direct">➕ 직접 입력</option>';
                }
            }
        }
        
        // 리스트 렌더링 로직 수정: 입고 내역 전체를 보여줌
        function renderTable() {
            const tbody = document.getElementById('dataTable');
            const search = document.getElementById('searchBar').value.toLowerCase();
            const summaryMap = getInventorySummary(db); // 잔량 참고용
            tbody.innerHTML = '';
        
            // db.inbound 배열을 직접 순회 (그래야 모든 입고 건이 보임)
            db.inbound.forEach(item => {
                if (!item.team.toLowerCase().includes(search) && !item.name.toLowerCase().includes(search)) return;
        
                const key = `${item.team}|${item.collab}|${item.num}|${item.name}`;
                const s = summaryMap[key] || { in:0, proc:0 };
                const rem = s.in - s.proc; // 전체 재고 상황
        
                const tr = document.createElement('tr');
                tr.className = "row-link";
                // 수정 시에는 해당 행의 qty(원본 입고량)를 불러와야 함
                tr.onclick = () => fillForm(item.team, item.collab, item.num, item.name, item.qty, item.idx);
        
                tr.innerHTML = `
                    <td class="p-4">
                        <span class="text-blue-400 font-bold">${item.team}</span> <span class="text-[10px] text-gray-500">${item.collab}</span><br>
                        <span class="text-gray-300 font-mono">[${item.num}]</span> ${item.name}
                    </td>
                    <td class="p-4 text-right">
                        <div class="text-white font-bold">${Number(item.qty).toLocaleString()}</div>
                        <div class="text-[10px] text-gray-500">잔량: ${rem}</div>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="event.stopPropagation(); deleteInbound('${item.idx}')" class="text-red-500 border border-red-900/50 px-2 py-1 rounded text-[10px] hover:bg-red-900/20">삭제</button>
                    </td>`;
                tbody.appendChild(tr);
            });
        }
        
        function fillForm(t, c, n, nm, q, idx) {
            document.getElementById('editIdx').value = idx;
            document.getElementById('editIndicator').classList.remove('hidden');
            const sBtn = document.getElementById('submitBtn');
            sBtn.innerText = "데이터 수정하기";
            sBtn.classList.replace('bg-blue-600', 'bg-yellow-600');
        
            const tSel = document.getElementById('teamSelect');
            if ([...tSel.options].some(o => o.value === t)) {
                tSel.value = t;
            } else {
                tSel.value = 'direct';
                document.getElementById('manualTeam').value = t;
            }
            
            updateCollabOptions();
            
            const cSel = document.getElementById('collabSelect');
            if (tSel.value !== 'direct' && [...cSel.options].some(o => o.value === c)) {
                cSel.value = c;
            } else {
                if(tSel.value !== 'direct') cSel.value = 'direct';
                document.getElementById('manualCollab').value = c;
            }
        
            document.getElementById('pNum').value = n;
            document.getElementById('pName').value = nm;
            document.getElementById('qty').value = q;
            window.scrollTo({top:0, behavior:'smooth'});
        }
        
        function resetForm() {
            document.getElementById('inboundForm').reset();
            document.getElementById('editIdx').value = "";
            document.getElementById('editIndicator').classList.add('hidden');
            const sBtn = document.getElementById('submitBtn');
            sBtn.innerText = "입고 데이터 저장하기";
            sBtn.classList.replace('bg-yellow-600', 'bg-blue-600');
            updateFormOptions();
        }
        
        document.getElementById('inboundForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const editIdx = document.getElementById('editIdx').value;
            
            const teamVal = document.getElementById('teamSelect').value;
            const collabVal = document.getElementById('collabSelect').value;
        
            const payload = {
                method: editIdx ? 'UPDATE' : 'INSERT',
                idx: editIdx,
                action: '입고',
                team: teamVal === 'direct' ? document.getElementById('manualTeam').value : teamVal,
                collab: (teamVal === 'direct' || collabVal === 'direct') ? document.getElementById('manualCollab').value : collabVal,
                num: document.getElementById('pNum').value,
                name: document.getElementById('pName').value,
                qty: document.getElementById('qty').value
            };
        
            if(!payload.team || !payload.name || !payload.qty) return alert("필수 정보를 입력해주세요.");
        
            btn.disabled = true; btn.innerText = "처리 중...";
            try {
                await sendData(payload);
                alert(editIdx ? "수정되었습니다." : "저장되었습니다.");
                location.reload();
            } catch(err) {
                alert("오류가 발생했습니다.");
                btn.disabled = false; btn.innerText = "다시 시도";
            }
        });
        
        async function deleteInbound(idx) {
            if(confirm("이 입고 기록을 삭제하시겠습니까?")) {
                await sendData({method:'DELETE', action:'입고', idx:idx});
                location.reload();
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
